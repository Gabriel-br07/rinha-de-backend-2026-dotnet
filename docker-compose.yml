services:
  nginx:
    image: nginx:1.27-alpine
    platform: linux/amd64
    ports:
      - "9999:9999"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    # Compose resource limits are inconsistently enforced across runtimes.
    # Keep deploy.limits (Swarm-compatible) and also set cpus/mem_limit for local runs.
    cpus: "0.05"
    mem_limit: 20m
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: 20M
    networks: [rinha]

  api1:
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/amd64
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - DOTNET_EnableDiagnostics=${DOTNET_EnableDiagnostics:-0}
      - DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=1
      - VECTOR_SEARCH_MODE=${VECTOR_SEARCH_MODE:-ivf}
      - IVF_NPROBE=${IVF_NPROBE:-8}
    expose:
      - "8080"
    cpus: "0.475"
    mem_limit: 155m
    deploy:
      resources:
        limits:
          cpus: "0.475"
          memory: 155M
    networks: [rinha]

  api2:
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/amd64
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - DOTNET_EnableDiagnostics=${DOTNET_EnableDiagnostics:-0}
      - DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=1
      - VECTOR_SEARCH_MODE=${VECTOR_SEARCH_MODE:-ivf}
      - IVF_NPROBE=${IVF_NPROBE:-8}
    expose:
      - "8080"
    cpus: "0.475"
    mem_limit: 155m
    deploy:
      resources:
        limits:
          cpus: "0.475"
          memory: 155M
    networks: [rinha]

networks:
  rinha:
    driver: bridge

